---
# ── Install cifs-utils on host (required for SMB mounts) ──
- name: Install cifs-utils
  apt:
    name: cifs-utils
    state: present

# ── SMB CSI Driver via Helm ──
- name: Add SMB CSI driver Helm repository
  kubernetes.core.helm_repository:
    name: "{{ smb_csi_helm_repo_name }}"
    repo_url: "{{ smb_csi_helm_repo_url }}"
  retries: "{{ smb_csi_helm_retries }}"
  delay: "{{ smb_csi_helm_delay }}"

- name: Install or upgrade SMB CSI driver
  kubernetes.core.helm:
    name: "{{ smb_csi_release_name }}"
    chart_ref: "{{ smb_csi_helm_repo_name }}/csi-driver-smb"
    release_namespace: "{{ smb_csi_namespace }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    update_repo_cache: true
  retries: "{{ smb_csi_helm_retries }}"
  delay: "{{ smb_csi_helm_delay }}"

- name: Wait for SMB CSI controller pod
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Pod
    namespace: "{{ smb_csi_namespace }}"
    label_selectors:
      - app=csi-smb-controller
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 120
  retries: "{{ smb_csi_wait_retries }}"
  delay: "{{ smb_csi_wait_delay }}"

- name: Wait for SMB CSI node pods
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Pod
    namespace: "{{ smb_csi_namespace }}"
    label_selectors:
      - app=csi-smb-node
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 120
  retries: "{{ smb_csi_wait_retries }}"
  delay: "{{ smb_csi_wait_delay }}"
