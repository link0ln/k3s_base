---
# ── ArgoCD installation via Helm ──────────────────────────────────

# ── Password generation (local, idempotent) ───────────────────────
- name: Check if ArgoCD admin password file exists
  stat:
    path: "{{ argocd_password_file }}"
  delegate_to: localhost
  become: false
  register: argocd_password_stat

- name: Generate ArgoCD admin password and bcrypt hash
  shell: python3 -c "import secrets,string,bcrypt;pw=''.join(secrets.choice(string.ascii_letters+string.digits)for _ in range({{ argocd_password_length }}));h=bcrypt.hashpw(pw.encode(),bcrypt.gensalt()).decode();print(pw+chr(10)+h)"
  delegate_to: localhost
  become: false
  register: argocd_password_gen
  no_log: true
  when: not argocd_password_stat.stat.exists

- name: Save ArgoCD admin password to file
  copy:
    content: "{{ argocd_password_gen.stdout_lines[0] }}"
    dest: "{{ argocd_password_file }}"
    mode: '0600'
  delegate_to: localhost
  become: false
  no_log: true
  when: not argocd_password_stat.stat.exists

- name: Set ArgoCD password hash fact (new password)
  set_fact:
    argocd_bcrypt_hash: "{{ argocd_password_gen.stdout_lines[1] }}"
  no_log: true
  when: not argocd_password_stat.stat.exists

- name: Regenerate bcrypt hash from existing password file
  shell: python3 -c "import bcrypt;pw=open('{{ argocd_password_file }}').read().strip();h=bcrypt.hashpw(pw.encode(),bcrypt.gensalt()).decode();print(h)"
  delegate_to: localhost
  become: false
  register: argocd_existing_hash
  no_log: true
  when: argocd_password_stat.stat.exists

- name: Set ArgoCD password hash fact (existing password)
  set_fact:
    argocd_bcrypt_hash: "{{ argocd_existing_hash.stdout }}"
  no_log: true
  when: argocd_password_stat.stat.exists

# ── Namespace ─────────────────────────────────────────────────────
- name: Create ArgoCD namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Namespace
    name: "{{ argocd_namespace }}"
    state: present

# ── Helm install ──────────────────────────────────────────────────
- name: Add ArgoCD Helm repository
  kubernetes.core.helm_repository:
    name: "{{ argocd_helm_repo_name }}"
    repo_url: "{{ argocd_helm_repo_url }}"
  retries: 5
  delay: 10

- name: Install or upgrade ArgoCD
  kubernetes.core.helm:
    name: "{{ argocd_release_name }}"
    chart_ref: "{{ argocd_helm_repo_name }}/{{ argocd_chart_name }}"
    release_namespace: "{{ argocd_namespace }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    update_repo_cache: true
    wait: true
    timeout: "{{ argocd_helm_timeout }}"
    values:
      configs:
        secret:
          argocdServerAdminPassword: "{{ argocd_bcrypt_hash }}"
      redis:
        image:
          repository: redis
          tag: 7-alpine
  register: argocd_install

# ── Wait for readiness ────────────────────────────────────────────
- name: Wait for argocd-server deployment
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Deployment
    name: argocd-server
    namespace: "{{ argocd_namespace }}"
  register: argocd_deploy
  retries: 30
  delay: 10
  until: >-
    argocd_deploy.resources[0].status.readyReplicas | default(0) ==
    argocd_deploy.resources[0].spec.replicas | default(1)

- name: Wait for ArgoCD pods to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Pod
    namespace: "{{ argocd_namespace }}"
    label_selectors:
      - "app.kubernetes.io/instance={{ argocd_release_name }}"
    field_selectors:
      - status.phase=Running
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: "{{ argocd_wait_timeout | regex_replace('s$', '') | int }}"
  retries: 3
  delay: 10

# ── Deploy ArgoCD Application ─────────────────────────────────────
- name: Deploy ArgoCD Application for k3s-base
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition: "{{ lookup('template', 'argocd-application.yml.j2') | from_yaml }}"
  register: argocd_app_apply

- name: ArgoCD Application status
  debug:
    msg: "ArgoCD Application '{{ argocd_app_name }}' deployed (repo: {{ argocd_app_repo }}, path: {{ argocd_app_path }})"

# ── Generate kubeconfig for untrusted SA ──────────────────────────
- name: Wait for ArgoCD to sync application
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ argocd_app_name }}"
    namespace: "{{ argocd_namespace }}"
  register: argocd_sync
  retries: 30
  delay: 5
  until: (argocd_sync.resources[0].status.sync.status | default('')) == 'Synced'
  changed_when: false

- name: Wait for untrusted-user ServiceAccount
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: ServiceAccount
    name: untrusted-user
    namespace: untrusted
  register: untrusted_sa_check
  retries: 12
  delay: 10
  until: untrusted_sa_check.resources | length > 0

- name: Create SA token secret for untrusted-user
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: untrusted-user-token
        namespace: untrusted
        annotations:
          kubernetes.io/service-account.name: untrusted-user
      type: kubernetes.io/service-account-token

- name: Wait for token to be populated in secret
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Secret
    name: untrusted-user-token
    namespace: untrusted
  register: untrusted_secret
  retries: 12
  delay: 5
  until: (untrusted_secret.resources[0].data.token | default('')) | length > 0
  changed_when: false

- name: Set SA token and CA facts
  set_fact:
    untrusted_sa_token: "{{ untrusted_secret.resources[0].data.token | b64decode }}"
    untrusted_sa_ca: "{{ untrusted_secret.resources[0].data['ca.crt'] }}"
  no_log: true

- name: Generate kubeconfig for untrusted-user SA
  copy:
    content: |
      apiVersion: v1
      kind: Config
      clusters:
        - cluster:
            certificate-authority-data: {{ untrusted_sa_ca }}
            server: https://{{ hostvars[inventory_hostname]['ansible_host'] }}:6443
          name: k3s
      contexts:
        - context:
            cluster: k3s
            namespace: untrusted
            user: untrusted-user
          name: untrusted
      current-context: untrusted
      users:
        - name: untrusted-user
          user:
            token: {{ untrusted_sa_token }}
    dest: "{{ playbook_dir }}/artifacts/untrusted-kubeconfig"
    mode: '0600'
  delegate_to: localhost
  become: false
  no_log: true

- name: Untrusted kubeconfig status
  debug:
    msg: "Kubeconfig for untrusted-user SA saved to: artifacts/untrusted-kubeconfig"

# ── Status output ─────────────────────────────────────────────────
- name: Get ArgoCD pod status
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Pod
    namespace: "{{ argocd_namespace }}"
  register: argocd_pods

- name: ArgoCD deployment summary
  debug:
    msg:
      - "ArgoCD deployed successfully in namespace '{{ argocd_namespace }}'"
      - "Admin password saved to: {{ argocd_password_file }}"
      - "Access UI: kubectl port-forward svc/argocd-server -n {{ argocd_namespace }} 8080:443"
      - "Login: admin / <contents of {{ argocd_password_file }}>"
      - ""
      - "Pods: {{ argocd_pods.resources | map(attribute='metadata.name') | list }}"
