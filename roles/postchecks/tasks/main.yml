---
# ══════════════════════════════════════════════════════════════
# ── Final post-checks: ensure all system pods are healthy ────
# ══════════════════════════════════════════════════════════════

# ── Cleanup stale pods ────────────────────────────────────────
- name: "Post-check: clean up Failed/Evicted pods in kube-system"
  shell: >
    /usr/local/bin/k3s kubectl delete pods -n kube-system
    --field-selector=status.phase=Failed
    --ignore-not-found=true
  register: cleanup_failed
  changed_when: "'deleted' in cleanup_failed.stdout"
  failed_when: false

- name: "Post-check: clean up Pending cilium-operator pods (single-node)"
  shell: >
    /usr/local/bin/k3s kubectl delete pods -n kube-system
    -l app.kubernetes.io/name=cilium-operator
    --field-selector=status.phase=Pending
    --ignore-not-found=true
  register: cleanup_pending_operator
  changed_when: "'deleted' in cleanup_pending_operator.stdout"
  failed_when: false

# ── Node readiness ────────────────────────────────────────────
- name: "Post-check: wait for all nodes to be Ready"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Node
  register: node_status
  retries: 24
  delay: 5
  until: >-
    node_status.resources | map(attribute='status.conditions')
    | map('selectattr', 'type', 'eq', 'Ready')
    | map('first') | map(attribute='status') | list
    | reject('eq', 'True') | list | length == 0

# ── Deployment rollouts ───────────────────────────────────────
- name: "Post-check: wait for system deployments"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Deployment
    name: "{{ item }}"
    namespace: kube-system
  register: deploy_check
  retries: 24
  delay: 5
  until: >-
    deploy_check.resources[0].status.readyReplicas | default(0) ==
    deploy_check.resources[0].spec.replicas | default(1)
  loop:
    - coredns
    - metrics-server
    - local-path-provisioner
    - cilium-operator

# ── DaemonSet rollouts ────────────────────────────────────────
- name: "Post-check: wait for cilium DaemonSet"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: DaemonSet
    name: cilium
    namespace: kube-system
  register: cilium_ds
  retries: 24
  delay: 5
  until: >-
    cilium_ds.resources[0].status.numberReady | default(0) ==
    cilium_ds.resources[0].status.desiredNumberScheduled | default(1)

- name: "Post-check: wait for nvidia-device-plugin pods"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Pod
    namespace: kube-system
    label_selectors:
      - app.kubernetes.io/name=nvidia-device-plugin
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: "{{ postchecks_rollout_timeout | regex_replace('s$', '') | int }}"
  when: nvidia_gpu_present | default(false) | bool

# ── Comprehensive pod readiness verification ──────────────────
- name: "Post-check: verify all kube-system pods are Running with all containers Ready"
  shell: |
    set -e
    ISSUES=""
    while IFS= read -r line; do
      [ -z "$line" ] && continue
      NAME=$(echo "$line" | awk '{print $1}')
      READY=$(echo "$line" | awk '{print $2}')
      STATUS=$(echo "$line" | awk '{print $3}')
      case "$STATUS" in Completed|Succeeded) continue;; esac
      if [ "$STATUS" != "Running" ]; then
        ISSUES="${ISSUES}  ${NAME} status=${STATUS}\n"
        continue
      fi
      READY_COUNT=$(echo "$READY" | cut -d/ -f1)
      TOTAL_COUNT=$(echo "$READY" | cut -d/ -f2)
      if [ "$READY_COUNT" != "$TOTAL_COUNT" ]; then
        ISSUES="${ISSUES}  ${NAME} containers not ready: ${READY}\n"
      fi
    done < <(/usr/local/bin/k3s kubectl get pods -n kube-system --no-headers)
    if [ -n "$ISSUES" ]; then
      printf "UNHEALTHY pods in kube-system:\n%b" "$ISSUES"
      exit 1
    fi
    echo "All kube-system pods are Running with all containers Ready"
  args:
    executable: /bin/bash
  register: final_health
  retries: "{{ postchecks_pod_health_retries }}"
  delay: "{{ postchecks_pod_health_delay }}"
  until: final_health.rc == 0
  changed_when: false

# ── Final cluster state ───────────────────────────────────────
- name: "Post-check: display final cluster state"
  shell: |
    echo "=== Nodes ==="
    /usr/local/bin/k3s kubectl get nodes -o wide
    echo ""
    echo "=== System Pods ==="
    /usr/local/bin/k3s kubectl get pods -n kube-system -o wide
  register: final_state
  changed_when: false

- name: Cluster status
  debug:
    msg: "{{ final_state.stdout_lines }}"
