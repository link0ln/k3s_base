---
# ── Cilium installation via Helm ────────────────────────────
- name: Check if Cilium is already running
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: DaemonSet
    name: cilium
    namespace: kube-system
  register: cilium_pre_check
  failed_when: false

- name: Add Cilium Helm repository
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: "{{ cilium_helm_repo_url }}"
  retries: "{{ cilium_helm_retries }}"
  delay: "{{ cilium_helm_delay }}"

- name: Install or upgrade Cilium
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    release_namespace: kube-system
    kubeconfig: "{{ k8s_kubeconfig }}"
    update_repo_cache: true
    values:
      kubeProxyReplacement: "{{ cilium_kube_proxy_replacement }}"
      k8sServiceHost: "{{ ansible_host }}"
      k8sServicePort: 6443
      operator:
        replicas: "{{ cilium_operator_replicas }}"
      bpf:
        enableTCX: "{{ cilium_bpf_enable_tcx }}"
        masquerade: "{{ cilium_bpf_masquerade }}"
        hostLegacyRouting: "{{ cilium_bpf_host_legacy_routing }}"
      routingMode: "{{ cilium_routing_mode }}"
      ipv4NativeRoutingCIDR: "{{ cilium_native_routing_cidr }}"
      autoDirectNodeRoutes: "{{ cilium_auto_direct_node_routes }}"
      socketLB:
        hostNamespaceOnly: "{{ cilium_socket_lb_host_ns_only }}"
      nodePort:
        range: "{{ cilium_nodeport_range }}"
  register: cilium_install

- name: Wait for Cilium agent pods to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Pod
    namespace: kube-system
    label_selectors:
      - app.kubernetes.io/name=cilium-agent
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: "{{ cilium_wait_timeout | regex_replace('s$', '') | int }}"
  retries: 6
  delay: 10
  register: cilium_agent_wait
  until: cilium_agent_wait is not failed

# ── Post-Cilium: fix eBPF/TCX state after upgrade ──────────────────
- name: Restart k3s with BPF cleanup after Cilium upgrade
  block:
    - name: Stop k3s for BPF state cleanup
      service:
        name: k3s
        state: stopped

    - name: Remove stale Cilium network interfaces and BPF state
      shell: |
        ip link delete cilium_host 2>/dev/null || true
        ip link delete cilium_vxlan 2>/dev/null || true
        for iface in $(ip link show type veth 2>/dev/null | grep 'lxc' | awk '{print $2}' | cut -d@ -f1 | tr -d ':'); do
          ip link delete "$iface" 2>/dev/null || true
        done
        find /sys/fs/bpf -name 'cilium*' -exec rm -rf {} + 2>/dev/null || true
        rm -rf /sys/fs/bpf/tc/globals/cilium* 2>/dev/null || true
      changed_when: true

    - name: Start k3s after BPF cleanup
      service:
        name: k3s
        state: started

    - name: Wait for k3s API after BPF cleanup
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        kind: Node
      register: k3s_api_bpf_recovery
      retries: "{{ cilium_bpf_recovery_api_retries }}"
      delay: "{{ cilium_bpf_recovery_api_delay }}"
      until: k3s_api_bpf_recovery.resources | length > 0

    - name: Delete Cilium agent pods to force full recreation
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: absent
        kind: Pod
        namespace: kube-system
        label_selectors:
          - app.kubernetes.io/name=cilium-agent
        force: true
        wait: true

    - name: Wait for new Cilium agent pods after BPF cleanup
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        kind: Pod
        namespace: kube-system
        label_selectors:
          - app.kubernetes.io/name=cilium-agent
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: "{{ cilium_wait_timeout | regex_replace('s$', '') | int }}"
      retries: "{{ cilium_bpf_recovery_cilium_retries }}"
      delay: "{{ cilium_bpf_recovery_cilium_delay }}"
      register: cilium_wait_bpf
      until: cilium_wait_bpf is not failed
  when:
    - cilium_pre_check.resources | default([]) | length > 0
    - cilium_install is changed

# Fresh install: pods started without CNI and need restart.
# Upgrade: pods may have broken networking from corrupted eBPF maps.
# No-op: skip — pods already have working networking.
- name: Rollout restart system pods after Cilium change
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Deployment
    name: "{{ item }}"
    namespace: kube-system
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"
    state: patched
  loop:
    - coredns
    - metrics-server
    - local-path-provisioner
  when: cilium_install is changed

- name: Wait for system pod rollouts after Cilium change
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Deployment
    name: "{{ item }}"
    namespace: kube-system
  register: deploy_status
  retries: 24
  delay: 5
  until: >-
    deploy_status.resources[0].status.updatedReplicas | default(0) ==
    deploy_status.resources[0].spec.replicas | default(1)
    and deploy_status.resources[0].status.readyReplicas | default(0) ==
    deploy_status.resources[0].spec.replicas | default(1)
  loop:
    - coredns
    - metrics-server
    - local-path-provisioner
  when: cilium_install is changed
