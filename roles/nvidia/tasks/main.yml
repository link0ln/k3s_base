---
# ── NVIDIA GPU support ──────────────────────────────────────
- name: Check if NVIDIA GPU is present
  shell: lspci | grep -i nvidia
  register: nvidia_check
  changed_when: false
  failed_when: false

- name: Set nvidia_gpu_present fact
  set_fact:
    nvidia_gpu_present: "{{ nvidia_check.rc == 0 }}"

- name: Check for NVIDIA GPU via WSL lib (fallback)
  stat:
    path: /usr/lib/wsl/lib/nvidia-smi
  register: wsl_nvidia_smi_stat
  when:
    - is_wsl | bool
    - not (nvidia_gpu_present | bool)

- name: Update nvidia_gpu_present for WSL
  set_fact:
    nvidia_gpu_present: true
  when:
    - is_wsl | bool
    - not (nvidia_gpu_present | bool)
    - wsl_nvidia_smi_stat.stat.exists | default(false)

- name: Ensure /usr/lib/wsl/lib is in system PATH (WSL)
  copy:
    content: 'export PATH="/usr/lib/wsl/lib:$PATH"'
    dest: /etc/profile.d/wsl-nvidia.sh
    mode: '0644'
  when:
    - is_wsl | bool
    - nvidia_gpu_present | bool

# ── NVIDIA driver installation ──
- name: Check if NVIDIA driver is already loaded
  shell: "{{ '/usr/lib/wsl/lib/nvidia-smi' if (is_wsl | bool) else 'nvidia-smi' }}"
  register: nvidia_smi_check
  changed_when: false
  failed_when: false
  when: nvidia_gpu_present | bool

- name: Install NVIDIA CUDA toolkit (WSL)
  block:
    - name: Download CUDA keyring package
      get_url:
        url: "{{ nvidia_cuda_keyring_url }}"
        dest: /tmp/cuda-keyring_1.1-1_all.deb
        mode: '0644'

    - name: Install CUDA keyring package
      apt:
        deb: /tmp/cuda-keyring_1.1-1_all.deb

    - name: Update apt cache after adding CUDA repo
      apt:
        update_cache: yes

    - name: Install cuda-toolkit
      apt:
        name: cuda-toolkit
        state: present
  when:
    - nvidia_gpu_present | bool
    - is_wsl | bool
    - nvidia_smi_check.rc != 0

- name: Install NVIDIA driver (ubuntu-drivers)
  block:
    - name: Install ubuntu-drivers-common
      apt:
        name: ubuntu-drivers-common
        state: present

    - name: Detect recommended NVIDIA driver
      command: ubuntu-drivers devices
      register: ubuntu_drivers_output
      changed_when: false

    - name: Install recommended NVIDIA drivers
      command: ubuntu-drivers autoinstall
      register: nvidia_driver_install
      changed_when: "'is already the newest version' not in nvidia_driver_install.stdout"
  when:
    - nvidia_gpu_present | bool
    - nvidia_smi_check.rc != 0
    - not (is_wsl | bool)

# ── NVIDIA Container Toolkit ──
- name: Install NVIDIA container toolkit
  block:
    - name: Download NVIDIA container toolkit GPG key
      get_url:
        url: "{{ nvidia_container_toolkit_gpg_url }}"
        dest: /tmp/nvidia-container-toolkit-keyring.gpg.armored
        mode: '0644'

    - name: Dearmor NVIDIA GPG key
      command: gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg /tmp/nvidia-container-toolkit-keyring.gpg.armored
      args:
        creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

    - name: Download NVIDIA container toolkit repo list
      get_url:
        url: "{{ nvidia_container_toolkit_list_url }}"
        dest: /tmp/nvidia-container-toolkit.list
        mode: '0644'
        timeout: 30
        force: false

    - name: Add signed-by to NVIDIA repo list and install
      shell: >
        sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g'
        /tmp/nvidia-container-toolkit.list
        > /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Update apt cache after adding NVIDIA repo
      apt:
        update_cache: yes

    - name: Install nvidia-container-toolkit
      apt:
        name: nvidia-container-toolkit
        state: present
  when: nvidia_gpu_present | bool

# ── Configure containerd for NVIDIA runtime ──
- name: Ensure k3s containerd config directory exists
  file:
    path: /var/lib/rancher/k3s/agent/etc/containerd
    state: directory
    mode: '0755'
  when: nvidia_gpu_present | bool

- name: Configure NVIDIA container runtime for k3s containerd
  command: >
    nvidia-ctk runtime configure
    --runtime=containerd
    --config=/var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
    --set-as-default
  args:
    creates: /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
  register: nvidia_ctk_config
  when: nvidia_gpu_present | bool
  notify: Restart k3s

- name: Flush handlers to restart k3s with NVIDIA runtime
  meta: flush_handlers

- name: Wait for k3s API after NVIDIA runtime restart
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Node
  register: k3s_ready_nvidia
  retries: "{{ nvidia_api_retries }}"
  delay: "{{ nvidia_api_delay }}"
  until: k3s_ready_nvidia.resources | length > 0
  when: nvidia_gpu_present | bool

# After k3s restart, Cilium BPF needs time to initialize.
# System pods that start before Cilium is ready get broken networking.
- name: Wait for Cilium agent after NVIDIA runtime restart
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Pod
    namespace: kube-system
    label_selectors:
      - app.kubernetes.io/name=cilium-agent
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: "{{ nvidia_cilium_wait_timeout | regex_replace('s$', '') | int }}"
  register: cilium_nvidia_wait
  retries: "{{ nvidia_cilium_wait_retries }}"
  delay: "{{ nvidia_cilium_wait_delay }}"
  until: cilium_nvidia_wait is not failed
  when: nvidia_gpu_present | bool

- name: Restart system pods after NVIDIA k3s restart
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Deployment
    name: "{{ item }}"
    namespace: kube-system
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"
    state: patched
  loop:
    - coredns
    - metrics-server
    - local-path-provisioner
  when: nvidia_ctk_config is changed

- name: Wait for system pod rollouts after NVIDIA k3s restart
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Deployment
    name: "{{ item }}"
    namespace: kube-system
  register: deploy_status
  retries: 24
  delay: 5
  until: >-
    deploy_status.resources[0].status.updatedReplicas | default(0) ==
    deploy_status.resources[0].spec.replicas | default(1)
    and deploy_status.resources[0].status.readyReplicas | default(0) ==
    deploy_status.resources[0].spec.replicas | default(1)
  loop:
    - coredns
    - metrics-server
    - local-path-provisioner
  when: nvidia_ctk_config is changed

# ── NVIDIA RuntimeClass for Kubernetes ──
- name: Create NVIDIA RuntimeClass manifest
  copy:
    content: |
      apiVersion: node.k8s.io/v1
      kind: RuntimeClass
      metadata:
        name: {{ nvidia_runtime_class_name }}
      handler: {{ nvidia_runtime_class_name }}
    dest: /var/lib/rancher/k3s/server/manifests/nvidia-runtime-class.yaml
    mode: '0644'
  when: nvidia_gpu_present | bool

# ── Label node for NVIDIA device plugin scheduling ──
# In WSL there is no PCI bus, so NFD cannot detect GPU via lspci.
# The device plugin DaemonSet requires one of these labels to schedule.
- name: Label node with nvidia.com/gpu.present=true
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Node
    name: "{{ ansible_hostname | lower }}"
    state: patched
    definition:
      metadata:
        labels:
          nvidia.com/gpu.present: "true"
  when: nvidia_gpu_present | bool

# ── NVIDIA Device Plugin via Helm ──
- name: Add NVIDIA device plugin Helm repository
  kubernetes.core.helm_repository:
    name: "{{ nvidia_device_plugin_repo_name }}"
    repo_url: "{{ nvidia_device_plugin_repo_url }}"
  retries: "{{ nvidia_device_plugin_helm_retries }}"
  delay: "{{ nvidia_device_plugin_helm_delay }}"
  when: nvidia_gpu_present | bool

- name: Install or upgrade NVIDIA device plugin
  kubernetes.core.helm:
    name: nvidia-device-plugin
    chart_ref: "{{ nvidia_device_plugin_repo_name }}/nvidia-device-plugin"
    release_namespace: kube-system
    kubeconfig: "{{ k8s_kubeconfig }}"
    update_repo_cache: true
    values:
      runtimeClassName: "{{ nvidia_runtime_class_name }}"
      deviceListStrategy: "{{ nvidia_device_list_strategy }}"
      config:
        default: "time-slicing"
        map:
          time-slicing: |-
            version: v1
            sharing:
              timeSlicing:
                resources:
                  - name: nvidia.com/gpu
                    replicas: {{ nvidia_time_slicing_replicas }}
  when: nvidia_gpu_present | bool

- name: Wait for NVIDIA device plugin to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Pod
    namespace: kube-system
    label_selectors:
      - app.kubernetes.io/name=nvidia-device-plugin
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: "{{ nvidia_device_plugin_wait_timeout | regex_replace('s$', '') | int }}"
  retries: 3
  delay: 10
  when: nvidia_gpu_present | bool

# ── GPU verification ──
- name: Verify GPU is visible in Kubernetes
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Node
  register: gpu_nodes
  when: nvidia_gpu_present | bool

- name: GPU support status
  debug:
    msg: >-
      {{ 'NVIDIA GPU detected. Allocatable GPUs: ' + (gpu_nodes.resources[0].status.allocatable['nvidia.com/gpu'] | default('checking...'))
         if (nvidia_gpu_present | bool)
         else 'No NVIDIA GPU detected — GPU support tasks skipped' }}
