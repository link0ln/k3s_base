apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-password-init
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-password-init
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-password-init
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: grafana-password-init
    namespace: monitoring
roleRef:
  kind: Role
  name: grafana-password-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-password-init
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    metadata:
      labels:
        app: grafana-password-init
    spec:
      serviceAccountName: grafana-password-init
      restartPolicy: Never
      containers:
        - name: init
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              API=https://kubernetes.default.svc
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              # Check if secret already exists
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --cacert $CA -H "Authorization: Bearer $TOKEN" \
                "$API/api/v1/namespaces/monitoring/secrets/grafana-admin")

              if [ "$STATUS" = "200" ]; then
                echo "Secret already exists, skipping"
                exit 0
              fi

              # Generate password
              PASSWORD=$(head -c 32 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 16)
              USER_B64=$(printf 'admin' | base64)
              PASS_B64=$(printf '%s' "$PASSWORD" | base64)

              # Create secret via API
              curl -s --cacert $CA -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -X POST "$API/api/v1/namespaces/monitoring/secrets" \
                -d "{
                  \"apiVersion\": \"v1\",
                  \"kind\": \"Secret\",
                  \"metadata\": {\"name\": \"grafana-admin\"},
                  \"data\": {
                    \"admin-user\": \"$USER_B64\",
                    \"admin-password\": \"$PASS_B64\"
                  }
                }"
              echo ""
              echo "Secret created"
  backoffLimit: 3
