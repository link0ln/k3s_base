apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-password-init
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-password-init
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-password-init
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: grafana-password-init
    namespace: monitoring
roleRef:
  kind: Role
  name: grafana-password-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-password-init
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    metadata:
      labels:
        app: grafana-password-init
    spec:
      serviceAccountName: grafana-password-init
      restartPolicy: Never
      containers:
        - name: init
          image: bitnami/kubectl:1.31.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              if kubectl get secret grafana-admin -n monitoring 2>/dev/null; then
                echo "Secret already exists, skipping"
                exit 0
              fi
              PASSWORD=$(head -c 32 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 16)
              kubectl create secret generic grafana-admin \
                -n monitoring \
                --from-literal=admin-user=admin \
                --from-literal=admin-password="$PASSWORD"
              echo "Secret created"
  backoffLimit: 3
