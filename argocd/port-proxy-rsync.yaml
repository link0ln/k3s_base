apiVersion: v1
kind: Pod
metadata:
  name: rsync-proxy
  namespace: port-proxy
  labels:
    app: rsync-proxy
spec:
  hostNetwork: true
  containers:
    - name: socat
      image: alpine/socat:latest
      securityContext:
        runAsUser: 0
      args:
        - TCP-LISTEN:30022,fork,reuseaddr
        - TCP:rsync-loader.untrusted.svc.cluster.local:22
      ports:
        - containerPort: 30022
          protocol: TCP
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 32Mi
  restartPolicy: Always
