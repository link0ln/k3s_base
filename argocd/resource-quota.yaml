apiVersion: v1
kind: ResourceQuota
metadata:
  name: untrusted-quota
  namespace: untrusted
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    requests.nvidia.com/gpu: "1"
    limits.nvidia.com/gpu: "1"
    pods: "10"
    services: "5"
    services.nodeports: "0"
    services.loadbalancers: "0"
    secrets: "10"
    configmaps: "10"
    persistentvolumeclaims: "3"
