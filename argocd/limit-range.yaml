apiVersion: v1
kind: LimitRange
metadata:
  name: untrusted-limits
  namespace: untrusted
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "20"
        memory: 60Gi
      min:
        cpu: 10m
        memory: 16Mi
    - type: Pod
      max:
        cpu: "20"
        memory: 60Gi
