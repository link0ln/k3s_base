apiVersion: v1
kind: Namespace
metadata:
  name: untrusted
  labels:
    # baseline allows GPU workloads (many ML containers run as root)
    # while still blocking hostPath, hostNetwork, hostPID, hostIPC, privileged
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
