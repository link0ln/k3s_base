apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: untrusted-user-storageclasses-reader
rules:
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: untrusted-user-storageclasses-reader
subjects:
  - kind: ServiceAccount
    name: untrusted-user
    namespace: untrusted
roleRef:
  kind: ClusterRole
  name: untrusted-user-storageclasses-reader
  apiGroup: rbac.authorization.k8s.io
