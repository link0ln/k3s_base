apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-node-exporter-dashboard
  namespace: monitoring
data:
  node-exporter.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "victoriametrics"},
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "victoriametrics"},
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "Used %",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "title": "Disk Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "victoriametrics"},
          "targets": [
            {
              "expr": "100 - ((node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"rootfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"rootfs\"}) * 100)",
              "legendFormat": "Disk Used %",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "title": "Network Traffic",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus", "uid": "victoriametrics"},
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{device!=\"lo\"}[5m])",
              "legendFormat": "RX {{device}}",
              "refId": "A"
            },
            {
              "expr": "rate(node_network_transmit_bytes_total{device!=\"lo\"}[5m])",
              "legendFormat": "TX {{device}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "title": "System Load",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "victoriametrics"},
          "targets": [
            {
              "expr": "node_load1",
              "legendFormat": "1m",
              "refId": "A"
            },
            {
              "expr": "node_load5",
              "legendFormat": "5m",
              "refId": "B"
            },
            {
              "expr": "node_load15",
              "legendFormat": "15m",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "title": "Uptime",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "datasource": {"type": "prometheus", "uid": "victoriametrics"},
          "targets": [
            {
              "expr": "time() - node_boot_time_seconds",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["node-exporter"],
      "time": {"from": "now-1h", "to": "now"},
      "title": "Node Exporter",
      "uid": "node-exporter"
    }
