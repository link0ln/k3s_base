apiVersion: v1
kind: ConfigMap
metadata:
  name: vmsingle-scrape-config
  namespace: monitoring
data:
  scrape.yml: |
    scrape_configs:
      - job_name: node-exporter
        scrape_interval: 15s
        static_configs:
          - targets: ['node-exporter:9100']
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vmsingle-data
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmsingle
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmsingle
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vmsingle
    spec:
      containers:
        - name: vmsingle
          image: victoriametrics/victoria-metrics:v1.108.1
          args:
            - -storageDataPath=/data
            - -promscrape.config=/config/scrape.yml
            - -retentionPeriod=30d
          ports:
            - containerPort: 8428
          volumeMounts:
            - name: data
              mountPath: /data
            - name: scrape-config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vmsingle-data
        - name: scrape-config
          configMap:
            name: vmsingle-scrape-config
---
apiVersion: v1
kind: Service
metadata:
  name: vmsingle
  namespace: monitoring
spec:
  selector:
    app: vmsingle
  ports:
    - port: 8428
      targetPort: 8428
